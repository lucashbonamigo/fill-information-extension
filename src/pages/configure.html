<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Configurações - Positivo S+</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="config-container">
        <h1 class="gradient-text">Configurações da Extensão</h1>
        
        <form id="configForm">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome">
            </div>

            <div class="form-group">
                <label for="matricula">Matrícula</label>
                <input type="text" id="matricula" placeholder="Ex: 123456">
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label for="horaEntrada">Hora de Entrada</label>
                    <input type="time" id="horaEntrada">
                </div>

                <div class="form-group" style="flex: 1;">
                    <label for="horaSaida">Hora de Saída</label>
                    <input type="time" id="horaSaida">
                </div>
            </div>

            <div class="form-group">
                <label for="equipe">Equipe</label>
                <select id="equipe">
                    <option value="">Selecione sua equipe...</option>
                    <option value="desenvolvimento">Service Desk</option>
                    <option value="suporte">Acessos</option>
                    <option value="infraestrutura">Field</option>
                    <option value="outros">Projetos</option>
                    <option value="outros">Service Desk Internacional</option>
                </select>
            </div>

            <div class="form-group">
                <label for="justificativa">Justificativa</label>
                <textarea id="justificativa" placeholder="Digite a justificativa (opcional)"></textarea>
            </div>

            <button type="button" class="positivo-gradient-bg" id="btnSalvar">Salvar Configurações</button>
        </form>
    </div>

    <script type="module" src="../js/configure.js"></script>
     <script type="module" src="../js/index.js"></script>
    </body>
</html>
